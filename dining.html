<!-- This is the dining page for my Campus Life App -->
<!-- It uses Bootstrap for styling and JavaScript for interaction -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Campus Life App - Dining</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- My CSS -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
      <a class="navbar-brand" href="index.html">Campus Life App</a>
      <div>
        <a class="text-white me-3" href="index.html">Home</a>
        <a class="text-white me-3" href="events.html">Events</a>
        <a class="text-white" href="dining.html">Dining</a>
      </div>
    </div>
  </nav>

  <div class="container mt-5">
    <h1>Campus Dining</h1>
    <p>Here are some campus food places.</p>

    <div class="card p-3 mb-3">
      <h3>Main Dining Hall</h3>
      <p>Open for breakfast, lunch, and dinner.</p>
    </div>

    <div class="card p-3 mb-3">
      <h3>Campus Cafe</h3>
      <p>Coffee, snacks, and sandwiches.</p>
    </div>

    <div class="card p-3 mb-3">
      <h3>Late Night Grill</h3>
      <p>Burgers, fries, and drinks.</p>
    </div>

    <hr>

    <h2>Search Food</h2>
    <input type="text" id="foodInput" class="form-control mb-3" placeholder="Type a food">
    <button id="foodBtn" class="btn btn-success mb-3">Search</button>
    <div id="foodText"></div>
  </div>

  <script src="js/script.js"></script>
</body>
</html>
